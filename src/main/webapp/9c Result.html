<%--
Displays greeting and link to check session
--%>

<html>
<body>

<%
    String user = (String) session.getAttribute("user");

    if (user != null) {
%>
        <h2>Hello <%= user %>!</h2>
        <p>Session is set. Click below to check status.</p>
        <a href="SessionCheckServlet">Check Session</a>
<%
    } else {
%>
        <h2>No active session</h2>
<%
    }
%>

</body>
</html>
